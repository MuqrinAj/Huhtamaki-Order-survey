<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Huhtamaki Survey">
<meta name="theme-color" content="#0A2550">
<title>Huhtamaki – Customer Order Survey</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0A2550;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.phone{background:#0A2550;border-radius:36px;padding:14px;width:100%;max-width:390px;border:2.5px solid #1a3a6e;min-height:calc(100vh - 32px);display:flex;flex-direction:column}
.screen{background:#F4F6FA;border-radius:24px;flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#0A2550;padding:16px 18px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-icon{width:34px;height:34px;background:#4CA8E0;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-text{color:#fff;font-size:15px;font-weight:600}
.logo-dot{color:#4CA8E0}
.step-bar{background:#0A2550;padding:0 18px 14px;display:flex;gap:6px;flex-shrink:0}
.step-dot{height:4px;border-radius:2px;flex:1;background:#1a3a6e;transition:.3s}
.step-dot.active{background:#4CA8E0}
.step-dot.done{background:#2ECC9A}
.screen-body{padding:22px 18px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.title-badge{display:inline-flex;align-items:center;gap:6px;background:#E6F1FB;border-radius:20px;padding:5px 12px;margin-bottom:14px}
.title-badge span{font-size:11px;color:#0C447C;font-weight:600;letter-spacing:.3px}
.title-badge svg{width:14px;height:14px;stroke:#185FA5;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.step-title{font-size:21px;font-weight:700;color:#0A2550;margin-bottom:4px;line-height:1.3}
.step-sub{font-size:13px;color:#6B7A99;margin-bottom:22px;line-height:1.6}
.field-label{font-size:12px;color:#6B7A99;font-weight:600;margin-bottom:7px;display:flex;align-items:center;gap:4px}
.req{color:#E24B4A;font-size:14px;line-height:1}
.field-input{width:100%;background:#fff;border:1.5px solid #E2E8F0;border-radius:13px;padding:13px 15px;font-size:15px;color:#0A2550;outline:none;transition:.2s;-webkit-appearance:none;font-family:inherit}
.field-input:focus{border-color:#4CA8E0;background:#F0F7FF}
.field-input.err{border-color:#E24B4A;background:#FFF5F5}
.field-input::placeholder{color:#C0CBDA;font-size:14px}
.field-group{margin-bottom:16px}
.err-msg{font-size:11px;color:#E24B4A;margin-top:5px;display:none}
.err-msg.show{display:block}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:7px}
.chip{background:#fff;border:1.5px solid #E2E8F0;border-radius:22px;padding:9px 15px;font-size:13px;color:#0A2550;cursor:pointer;transition:.15s;white-space:nowrap;user-select:none}
.chip:active{transform:scale(.97)}
.chip.sel{background:#E6F1FB;border-color:#4CA8E0;color:#0C447C;font-weight:600}
.cup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:7px}
.cup-card{background:#fff;border:1.5px solid #E2E8F0;border-radius:16px;padding:14px 10px;text-align:center;cursor:pointer;transition:.15s;user-select:none}
.cup-card:active{transform:scale(.97)}
.cup-card.sel{background:#E6F1FB;border-color:#4CA8E0}
.cup-icon{margin-bottom:8px;display:flex;align-items:center;justify-content:center}
.cup-icon svg{width:30px;height:30px;stroke:#0A2550;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.cup-name{font-size:12px;font-weight:600;color:#0A2550;margin-bottom:2px}
.cup-sub{font-size:10px;color:#6B7A99}
.cup-check{display:none;width:20px;height:20px;background:#4CA8E0;border-radius:50%;margin:7px auto 0;align-items:center;justify-content:center}
.cup-check svg{width:11px;height:11px;stroke:#fff;stroke-width:2.5;fill:none}
.cup-card.sel .cup-check{display:flex}

/* consumption table */
.cons-table{width:100%;border-collapse:collapse;margin-top:8px}
.cons-table th{font-size:11px;color:#6B7A99;font-weight:600;padding:6px 8px;background:#E6F1FB;text-align:center}
.cons-table th:first-child{border-radius:8px 0 0 8px;text-align:right}
.cons-table th:last-child{border-radius:0 8px 8px 0}
.cons-table td{padding:6px 6px;vertical-align:middle}
.cons-table tr{border-bottom:.5px solid #F0F3F9}
.cons-table tr:last-child{border-bottom:none}
.cons-table .cup-label{font-size:13px;color:#0A2550;font-weight:500;padding-right:2px}
.cons-table .cup-label-sub{font-size:10px;color:#6B7A99}
.cons-inp{width:100%;background:#fff;border:1.5px solid #E2E8F0;border-radius:9px;padding:8px 10px;font-size:13px;color:#0A2550;outline:none;font-family:inherit;-webkit-appearance:none;text-align:center}
.cons-inp:focus{border-color:#4CA8E0;background:#F0F7FF}
.add-row-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;background:#F4F6FA;border:1.5px dashed #C8D2E0;border-radius:12px;padding:10px;font-size:13px;color:#185FA5;cursor:pointer;margin-top:10px;font-family:inherit;font-weight:500}
.add-row-btn svg{width:16px;height:16px;stroke:#185FA5;stroke-width:2;fill:none}
.remove-row{width:26px;height:26px;border-radius:50%;background:#FFF5F5;border:1.5px solid #FFCCCC;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.remove-row svg{width:12px;height:12px;stroke:#E24B4A;stroke-width:2;fill:none}

.next-btn{width:100%;background:#0A2550;color:#fff;border:none;border-radius:15px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;margin-top:22px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;-webkit-appearance:none}
.next-btn:active{background:#185FA5;transform:scale(.99)}
.next-btn svg{width:18px;height:18px;stroke:#fff;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.back-btn{width:100%;background:transparent;color:#6B7A99;border:none;padding:11px;font-size:13px;cursor:pointer;margin-top:6px;font-family:inherit}
.rep-card{background:#E6F1FB;border-radius:15px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:16px}
.rep-av{width:46px;height:46px;background:#0A2550;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0}
.rep-name{font-size:14px;font-weight:700;color:#0C447C}
.rep-sub{font-size:12px;color:#185FA5;margin-top:2px}
.send-btn{width:100%;background:#2ECC9A;color:#085041;border:none;border-radius:15px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;-webkit-appearance:none}
.send-btn:active{background:#27b589;transform:scale(.99)}
.send-btn svg{width:18px;height:18px;stroke:#085041;stroke-width:2.5;fill:none}
.done-wrap{padding:32px 20px;text-align:center;display:flex;flex-direction:column;align-items:center}
.done-icon{width:68px;height:68px;background:#E1F5EE;border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center}
.done-icon svg{width:32px;height:32px;stroke:#1D9E75;stroke-width:2.5;fill:none}
.done-title{font-size:22px;font-weight:700;color:#0A2550;margin-bottom:8px}
.done-sub{font-size:14px;color:#6B7A99;line-height:1.7;margin-bottom:24px}
.summary-card{width:100%;background:#fff;border:1.5px solid #E2E8F0;border-radius:15px;padding:16px;margin-bottom:14px;text-align:right}
.summary-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid #F0F3F9;font-size:13px;gap:8px}
.summary-row:last-child{border-bottom:none}
.s-key{color:#6B7A99;flex-shrink:0}
.s-val{color:#0A2550;font-weight:600;font-size:12px;text-align:left;word-break:break-word;max-width:60%}
.wa-btn{width:100%;background:#25D366;color:#fff;border:none;border-radius:15px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;text-decoration:none;font-family:inherit}
.wa-btn:active{background:#20b858}
.wa-btn svg{width:20px;height:20px;fill:#fff}
.lang-screen{padding:36px 20px;text-align:center;display:flex;flex-direction:column;align-items:center}
.lang-logo{width:60px;height:60px;background:#0A2550;border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.lang-logo svg{width:30px;height:30px;stroke:#4CA8E0;stroke-width:2;fill:none}
.lang-headline{font-size:22px;font-weight:700;color:#0A2550;margin-bottom:6px}
.lang-sub{font-size:13px;color:#6B7A99;margin-bottom:30px;line-height:1.6}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%}
.lang-card{background:#fff;border:1.5px solid #E2E8F0;border-radius:20px;padding:26px 12px;cursor:pointer;text-align:center;transition:.15s;user-select:none}
.lang-card:active{transform:scale(.97);border-color:#4CA8E0}
.lang-flag{font-size:38px;margin-bottom:10px;display:block;line-height:1}
.lang-name{font-size:15px;font-weight:700;color:#0A2550;margin-bottom:2px}
.lang-native{font-size:12px;color:#6B7A99}
</style>
</head>
<body>
<div class="phone">
  <div class="screen">
    <div class="topbar">
      <div class="topbar-icon">
        <svg viewBox="0 0 24 24"><path d="M8 3h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M18 8h1a2 2 0 0 1 0 4h-1"/></svg>
      </div>
      <span class="logo-text">Huhtamaki<span class="logo-dot"> · </span><span id="topLabel">Customer Order</span></span>
    </div>
    <div class="step-bar" id="stepBar" style="display:none">
      <div class="step-dot" id="d0"></div>
      <div class="step-dot" id="d1"></div>
      <div class="step-dot" id="d2"></div>
      <div class="step-dot" id="d3"></div>
    </div>
    <div class="screen-body" id="screenBody">

      <!-- LANG -->
      <div id="sLang" class="lang-screen">
        <div class="lang-logo"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3a15 15 0 0 1 0 18M3 12h18M3.6 7.5h16.8M3.6 16.5h16.8"/></svg></div>
        <div class="lang-headline">Welcome / أهلاً</div>
        <div class="lang-sub">Select your language<br>اختر لغتك المفضلة</div>
        <div class="lang-grid">
          <div class="lang-card" onclick="setLang('ar')"><span class="lang-flag">🇸🇦</span><div class="lang-name">العربية</div><div class="lang-native">Arabic</div></div>
          <div class="lang-card" onclick="setLang('en')"><span class="lang-flag">🇬🇧</span><div class="lang-name">English</div><div class="lang-native">الإنجليزية</div></div>
        </div>
      </div>

      <!-- STEP 0 -->
      <div id="s0" style="display:none">
        <div class="title-badge"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span id="l_step1"></span></div>

          <div class="err-msg" id="e_bizName"></div>

        <div class="field-group">
          <div class="field-label"><span id="l_bizType"></span><span class="req">*</span></div>
          <div class="chips" id="bizType" data-multi="false"></div>
          <div class="err-msg" id="e_bizType"></div>
        </div>
        <button class="next-btn" id="btn_n1" onclick="vGo(1)"></button>
      </div>

      <!-- STEP 1 -->
      <div id="s1" style="display:none">
        <div class="title-badge"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><span id="l_step2"></span></div>
        <div class="step-title" id="l_t2"></div>
        <div class="step-sub" id="l_s2"></div>
        <div class="field-group">
          <div class="field-label"><span id="l_branches"></span><span class="req">*</span></div>
          <div class="chips" id="branches" data-multi="false"></div>
          <div class="err-msg" id="e_branches"></div>
        </div>
        <div class="field-group" style="margin-top:16px">
          <div class="field-label"><span id="l_region"></span></div>
          <div class="chips" id="region" data-multi="true"></div>
        </div>
        <button class="next-btn" id="btn_n2" onclick="vGo(2)"></button>
        <button class="back-btn" id="btn_b2" onclick="goStep(0)"></button>
      </div>

      <!-- STEP 2 -->
      <div id="s2" style="display:none">
        <div class="title-badge"><svg viewBox="0 0 24 24"><path d="M8 3h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M18 8h1a2 2 0 0 1 0 4h-1"/></svg><span id="l_step3"></span></div>
        <div class="step-title" id="l_t3"></div>
        <div class="step-sub" id="l_s3"></div>
        <div class="field-group">
          <div class="field-label"><span id="l_cupType"></span><span class="req">*</span></div>
          <div class="cup-grid" id="cupType"></div>
          <div class="err-msg" id="e_cupType"></div>
        </div>
        <div class="field-group" style="margin-top:18px">
          <div class="field-label"><span id="l_qty"></span><span class="req">*</span></div>
          <table class="cons-table">
            <thead><tr>
              <th id="th_cup" style="width:36%"></th>
              <th id="th_size" style="width:32%"></th>
              <th id="th_qty" style="width:22%"></th>
              <th style="width:10%"></th>
            </tr></thead>
            <tbody id="consBody"></tbody>
          </table>
          <button class="add-row-btn" id="addRowBtn" onclick="addRow()">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span id="l_addRow"></span>
          </button>
          <div class="err-msg" id="e_cons"></div>
        </div>
        <button class="next-btn" id="btn_n3" onclick="vGo(3)"></button>
        <button class="back-btn" id="btn_b3" onclick="goStep(1)"></button>
      </div>

      <!-- STEP 3 -->
      <div id="s3" style="display:none">
        <div class="title-badge"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span id="l_step4"></span></div>
        <div class="step-title" id="l_t4"></div>
        <div class="step-sub" id="l_s4"></div>
        <div class="field-group">
          <div class="field-label"><span id="l_cRole"></span><span class="req">*</span></div>
          <input class="field-input" type="text" id="cRole" oninput="clearE('cRole','e_cRole')">
          <div class="err-msg" id="e_cRole"></div>
        </div>
        <div class="field-group">
          <div class="field-label"><span id="l_cName"></span><span class="req">*</span></div>
          <input class="field-input" type="text" id="cName" oninput="clearE('cName','e_cName')">
          <div class="err-msg" id="e_cName"></div>
        </div>
        <div class="field-group">
          <div class="field-label"><span id="l_cPhone"></span><span class="req">*</span></div>
          <input class="field-input" type="tel" id="cPhone" style="direction:ltr" oninput="clearE('cPhone','e_cPhone')">
          <div class="err-msg" id="e_cPhone"></div>
        </div>
        <div class="field-group">
          <div class="field-label"><span id="l_cEmail"></span><span class="req">*</span></div>

          <div class="err-msg" id="e_cEmail"></div>
        </div>
        <div class="rep-card">
          <div class="rep-av">MA</div>
          <div><div class="rep-name">Muqrin Aljoudi</div><div class="rep-sub">Sales Representative – KSA</div></div>
        </div>
        <button class="send-btn" id="btn_send" onclick="vSubmit()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          <span id="l_send"></span>
        </button>
        <button class="back-btn" id="btn_b4" onclick="goStep(2)"></button>
      </div>

      <!-- DONE -->

        <div class="done-wrap">
          <div class="done-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="done-title" id="l_doneTitle"></div>
          <div class="done-sub" id="l_doneSub"></div>
          <div class="summary-card" id="summaryBox"></div>
          <div class="rep-card" style="width:100%">
            <div class="rep-av">MA</div>
            <div><div class="rep-name">Muqrin Aljoudi</div><div class="rep-sub">muqrin.aljoudi@huhtamaki.com</div></div>

            <span id="l_wa"></span>

    </div>

</div>

<script>
var lang='ar';

var T={
  ar:{
    topLabel:'طلب / استبيان',
    step1:'معلومات المنشأة',t1:'عرّفنا بمنشأتك',s1:'نسعد بالتعرف على مؤسستكم الكريمة',

    bizName:'اسم المنشأة',bizNamePh:'مثال: مجموعة الدولي للمطاعم',
    bizType:'نوع النشاط التجاري',
    bizTypes:['مقهى / كافيه','مطعم','فندق','توصيل طلبات','مخبز','أخرى'],
    branches:'عدد الفروع',
    branchOpts:['فرع واحد','٢ – ٥ فروع','٦ – ١٥ فرع','١٦ – ٥٠ فرع','أكثر من ٥٠'],
    region:'مناطق التواجد',
    regionOpts:['الرياض','جدة','الدمام','المدينة','الإمارات','الكويت','البحرين','أخرى'],
    cupType:'نوع الأكواب',

  hot:'<svg viewBox="0 0 24 24"><path d="M8 3h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M18 8h1a2 2 0 0 1 0 4h-1"/><path d="M10 7c0-1 1-2 1-3M13 7c0-1 1-2 1-3"/></svg>',

  plastic:'<svg viewBox="0 0 24 24"><path d="M7 3h10l1 4H6z"/><path d="M6 7v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7"/><path d="M9 3v2M15 3v2"/></svg>',

var rowCount=0;

function setLang(l){
  lang=l;var t=T[l];var isAr=l==='ar';var dir=isAr?'rtl':'ltr';
  document.documentElement.lang=l;document.documentElement.dir=dir;
  document.getElementById('sLang').style.display='none';
  document.getElementById('stepBar').style.display='flex';
  document.getElementById('topLabel').textContent=t.topLabel;
  setText('l_step1',t.step1);setText('l_t1',t.t1);setText('l_s1',t.s1);
  setText('l_step2',t.step2);setText('l_t2',t.t2);setText('l_s2',t.s2);
  setText('l_step3',t.step3);setText('l_t3',t.t3);setText('l_s3',t.s3);
  setText('l_step4',t.step4);setText('l_t4',t.t4);setText('l_s4',t.s4);
  setText('l_bizName',t.bizName);sph('bizName',t.bizNamePh);
  setText('l_bizType',t.bizType);setText('l_branches',t.branches);setText('l_region',t.region);
  setText('l_cupType',t.cupType);setText('l_qty',t.qty);
  setText('th_cup',t.thCup);setText('th_size',t.thSize);setText('th_qty',t.thQty);
  setText('l_addRow',t.addRow);
  setText('l_cRole',t.cRole);sph('cRole',t.cRolePh);
  setText('l_cName',t.cName);sph('cName',t.cNamePh);
  setText('l_cPhone',t.cPhone);sph('cPhone',t.cPhonePh);
  setText('l_cEmail',t.cEmail);
  setText('l_doneTitle',t.doneTitle);setText('l_doneSub',t.doneSub);setText('l_wa',t.wa);
  var aL='<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#fff;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round"><polyline points="15 18 9 12 15 6"/></svg>';
  var aR='<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#fff;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round"><polyline points="9 18 15 12 9 6"/></svg>';
  ['btn_n1','btn_n2','btn_n3'].forEach(function(id){document.getElementById(id).innerHTML=isAr?aL+' '+t.next:t.next+' '+aR;});
  ['btn_b2','btn_b3','btn_b4'].forEach(function(id){document.getElementById(id).textContent=t.back;});
  document.getElementById('btn_send').innerHTML='<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#085041;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> '+t.send;
  buildChips('bizType',t.bizTypes,false);buildChips('branches',t.branchOpts,false);buildChips('region',t.regionOpts,true);buildCups(t.cups);
  document.getElementById('consBody').innerHTML='';rowCount=0;addRow();
  goStep(0);
}

function setText(id,v){var e=document.getElementById(id);if(e)e.textContent=v;}
function sph(id,v){var e=document.getElementById(id);if(e)e.placeholder=v;}

function buildChips(id,opts,multi){
  var c=document.getElementById(id);c.innerHTML='';c.dataset.multi=multi?'true':'false';
  opts.forEach(function(o){var d=document.createElement('div');d.className='chip';d.textContent=o;d.onclick=function(){toggleChip(d,id);};c.appendChild(d);});
}
function buildCups(cups){
  var c=document.getElementById('cupType');c.innerHTML='';
  cups.forEach(function(cp){
    var d=document.createElement('div');d.className='cup-card';d.onclick=function(){d.classList.toggle('sel');clearE('cupType','e_cupType');};
    d.innerHTML='<div class="cup-icon">'+cupIcons[cp.i]+'</div><div class="cup-name">'+cp.n+'</div><div class="cup-sub">'+cp.s+'</div><div class="cup-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>';
    c.appendChild(d);
  });
}
function toggleChip(el,grp){
  var g=document.getElementById(grp);
  if(g.dataset.multi==='true'){el.classList.toggle('sel');}
  else{g.querySelectorAll('.chip').forEach(function(c){c.classList.remove('sel');});el.classList.add('sel');}
  if(grp==='bizType')clearE('bizType','e_bizType');
  if(grp==='branches')clearE('branches','e_branches');
}

function addRow(){
  var t=T[lang];var isAr=lang==='ar';
  var tbody=document.getElementById('consBody');
  var id=++rowCount;
  var tr=document.createElement('tr');tr.id='row_'+id;
  var selOpts='';
  var cups=document.querySelectorAll('#cupType .sel');
  if(cups.length){cups.forEach(function(c){var n=c.querySelector('.cup-name').textContent;selOpts+='<option value="'+n+'">'+n+'</option>';});}
  else{t.cups.forEach(function(c){selOpts+='<option value="'+c.n+'">'+c.n+'</option>';});}

  tr.innerHTML='<td><select class="cons-inp" style="text-align:center">'+selOpts+'</select></td>'
    +'<td><input class="cons-inp" type="text" placeholder="'+t.sizePlh+'"></td>'
    +'<td><input class="cons-inp" type="number" min="1" placeholder="'+t.qtyPlh+'" style="direction:ltr"></td>'
    +'<td style="text-align:center"><button class="remove-row" onclick="removeRow('+id+')" aria-label="remove"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></td>';
  tbody.appendChild(tr);
  clearE(null,'e_cons');
}
function removeRow(id){
  var r=document.getElementById('row_'+id);
  if(r && document.getElementById('consBody').children.length>1)r.remove();
}

function showE(fid,eid,msg){var e=document.getElementById(eid);if(e){e.textContent=msg;e.classList.add('show');}if(fid){var f=document.getElementById(fid);if(f)f.classList.add('err');}}
function clearE(fid,eid){if(eid){var e=document.getElementById(eid);if(e)e.classList.remove('show');}if(fid){var f=document.getElementById(fid);if(f)f.classList.remove('err');}}

function vGo(step){
  var t=T[lang];var ok=true;
  if(step===1){
    if(!document.getElementById('bizName').value.trim()){showE('bizName','e_bizName',t.errReq);ok=false;}
    if(!document.querySelector('#bizType .sel')){showE('bizType','e_bizType',t.errSel);ok=false;}
  }
  if(step===2){if(!document.querySelector('#branches .sel')){showE('branches','e_branches',t.errSel);ok=false;}}
  if(step===3){
    if(!document.querySelectorAll('#cupType .sel').length){showE('cupType','e_cupType',t.errCup);ok=false;}
    var rows=document.querySelectorAll('#consBody tr');var hasData=false;
    rows.forEach(function(r){var inp=r.querySelectorAll('input');if(inp[0]&&inp[0].value.trim()&&inp[1]&&inp[1].value.trim())hasData=true;});
    if(!hasData){showE(null,'e_cons',t.errCons);ok=false;}
  }
  if(ok){goStep(step);document.getElementById('screenBody').scrollTop=0;}
}

function vSubmit(){
  var t=T[lang];var ok=true;
  if(!document.getElementById('cRole').value.trim()){showE('cRole','e_cRole',t.errReq);ok=false;}
  if(!document.getElementById('cName').value.trim()){showE('cName','e_cName',t.errReq);ok=false;}
  if(!document.getElementById('cPhone').value.trim()||document.getElementById('cPhone').value.trim().length<9){showE('cPhone','e_cPhone',t.errPhone);ok=false;}
  var em=document.getElementById('cEmail').value.trim();
  if(!em||em.indexOf('@')<1){showE('cEmail','e_cEmail',t.errEmail);ok=false;}
  if(ok)goSuccess();
}

function goStep(n){
  ['s0','s1','s2','s3','sDone'].forEach(function(id){document.getElementById(id).style.display='none';});
  document.getElementById('s'+n).style.display='block';
  document.querySelectorAll('.step-dot').forEach(function(d,i){d.classList.remove('active','done');if(i<n)d.classList.add('done');else if(i===n)d.classList.add('active');});
}

function goSuccess(){
  var t=T[lang];var isAr=lang==='ar';
  var biz=document.getElementById('bizName').value.trim()||'—';
  var bizS=document.querySelector('#bizType .sel');
  var brS=document.querySelector('#branches .sel');
  var regions=Array.from(document.querySelectorAll('#region .sel')).map(function(c){return c.textContent;}).join(', ')||'—';
  var cups=Array.from(document.querySelectorAll('#cupType .sel')).map(function(c){return c.querySelector('.cup-name').textContent;}).join(', ')||'—';
  var consLines=[];
  document.querySelectorAll('#consBody tr').forEach(function(r){
    var sel=r.querySelector('select');var inps=r.querySelectorAll('input');
    var cupT=sel?sel.value:'';var sz=inps[0]?inps[0].value.trim():'';var qty=inps[1]?inps[1].value.trim():'';
    if(sz&&qty)consLines.push(cupT+' '+sz+' × '+qty);
  });
  var consStr=consLines.join(' | ')||'—';
  var role=document.getElementById('cRole').value.trim();
  var name=document.getElementById('cName').value.trim();
  var phone=document.getElementById('cPhone').value.trim();
  var email=document.getElementById('cEmail').value.trim();
  var rowVals=[biz,bizS?bizS.textContent:'—',brS?brS.textContent:'—',regions,cups,consStr,role,name,phone,email];
  var html='';
  t.sumKeys.forEach(function(k,i){
    html+='<div class="summary-row">'
      +(isAr?'<span class="s-val">'+rowVals[i]+'</span><span class="s-key">'+k+'</span>'
            :'<span class="s-key">'+k+'</span><span class="s-val">'+rowVals[i]+'</span>')
      +'</div>';
  });
  document.getElementById('summaryBox').innerHTML=html;
  document.getElementById('summaryBox').style.direction=isAr?'rtl':'ltr';
  ['s0','s1','s2','s3'].forEach(function(id){document.getElementById(id).style.display='none';});
  document.getElementById('sDone').style.display='block';
  document.querySelectorAll('.step-dot').forEach(function(d){d.classList.remove('active');d.classList.add('done');});
  document.getElementById('screenBody').scrollTop=0;
}
</script>
